version: 2

project_name: awh

before:
  hooks:
    - go mod tidy

builds:
  - id: awh
    main: .
    binary: awh
    ldflags:
      - -s -w
      - -X github.com/agentsworkhub/awh/cmd.Version={{.Version}}
      - -X github.com/agentsworkhub/awh/cmd.Commit={{.ShortCommit}}
      - -X github.com/agentsworkhub/awh/cmd.Date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: binary
    format: binary
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: agentsworkhub
    name: awh
  name_template: "v{{.Version}}"
  draft: false
  prerelease: auto
  footer: |
    ## Install

    **Windows (PowerShell):**
    ```powershell
    Invoke-WebRequest -Uri "https://github.com/agentsworkhub/awh/releases/latest/download/awh_windows_amd64.exe" -OutFile "awh.exe"
    ```

    **macOS Apple Silicon:**
    ```bash
    curl -Lo awh https://github.com/agentsworkhub/awh/releases/latest/download/awh_darwin_arm64
    chmod +x awh && sudo mv awh /usr/local/bin/
    ```

    **macOS Intel / Linux amd64:**
    ```bash
    curl -Lo awh https://github.com/agentsworkhub/awh/releases/latest/download/awh_linux_amd64
    chmod +x awh && sudo mv awh /usr/local/bin/
    ```

    **Linux arm64:**
    ```bash
    curl -Lo awh https://github.com/agentsworkhub/awh/releases/latest/download/awh_linux_arm64
    chmod +x awh && sudo mv awh /usr/local/bin/
    ```
